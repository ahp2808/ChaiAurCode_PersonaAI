<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Persona AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="rig">
      <aside class="rail" aria-label="Chat channels">
        <div class="rail-brand">
          <span class="rail-brand-mark">◐</span>
          <span class="rail-brand-text">PERSONA&nbsp;AI</span>
        </div>

        <div class="channels">
          <button
            class="channel-btn is-active"
            data-channel="chat1"
            type="button"
          >
            <span class="channel-dot"></span>
            <span class="channel-meta">
              <span class="channel-id">Let's chat with</span>
              <span class="channel-name">Hitesh Sir</span>
            </span>
          </button>

          <button
            class="channel-btn is-active"
            data-channel="chat2"
            type="button"
          >
            <span class="channel-dot"></span>
            <span class="channel-meta">
              <span class="channel-id">Let's chat with</span>
              <span class="channel-name">Piyush Sir</span>
            </span>
          </button>
        </div>
      </aside>

      <main class="deck">
        <header class="deck-header">
          <h1 id="deck-title">Ask Hitesh Sir a question or type a message.</h1>
          <p id="deck-subtitle"></p>
        </header>

        <section class="transcript" id="transcript" aria-live="polite">
          <div class="empty-state" id="empty-state">
            <p class="empty-state-sub">Type below to start.</p>
          </div>
        </section>

        <form class="composer" id="composer" autocomplete="off">
          <textarea
            id="prompt-input"
            class="composer-input"
            placeholder="Type your thoughts here…"
            rows="1"
            required
          ></textarea>
          <button
            type="submit"
            class="composer-send"
            id="send-btn"
            aria-label="Send message"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M4 12L20 4L13 20L11 13L4 12Z"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </form>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
